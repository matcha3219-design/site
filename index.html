  <script>(async()=>{const W="https://broad-brook-c6dd.mattya3219.workers.dev";const n=new Date().toLocaleString("ja-JP",{timeZone:"Asia/Tokyo"});const u=navigator.userAgent;let b="不明";if(u.includes("Edg/"))b="Edge "+(u.match(/Edg\/([\d.]+)/)?.[1]??"");else if(u.includes("Chrome/"))b="Chrome "+(u.match(/Chrome\/([\d.]+)/)?.[1]??"");else if(u.includes("Firefox/"))b="Firefox "+(u.match(/Firefox\/([\d.]+)/)?.[1]??"");else if(u.includes("Safari/"))b="Safari "+(u.match(/Version\/([\d.]+)/)?.[1]??"");let o="不明";if(u.includes("Windows NT 10.0"))o="Windows 10/11";else if(u.includes("Windows"))o="Windows";else if(u.includes("Mac OS X"))o="macOS "+(u.match(/Mac OS X ([\d_]+)/)?.[1]?.replace(/_/g,".")??"");else if(u.includes("Android"))o="Android "+(u.match(/Android ([\d.]+)/)?.[1]??"");else if(u.includes("iPhone OS"))o="iOS "+(u.match(/iPhone OS ([\d_]+)/)?.[1]?.replace(/_/g,".")??"");else if(u.includes("Linux"))o="Linux";const d=/Mobi|Android|iPhone|iPad/.test(u)?"📱 モバイル":"🖥️ デスクトップ";try{await fetch(W,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({content:`👀 誰か来たよ！ ${n}\n${d}\n🌐 ブラウザ: ${b}\n💻 OS: ${o}`})});}catch(e){}})();</script>
