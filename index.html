<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>セキュアログインシステム v∞</title>
<style>
/* ===== リセット & ベース ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #080810;
  --card:      #0e0e1c;
  --card-b:    #1c1c38;
  --txt:       #b0b0cc;
  --txt-dim:   #555580;
  --in-bg:     #090915;
  --in-b:      #22223a;
  --accent:    #4455ee;
  --danger:    #cc3355;
  --warn:      #996600;
  --green:     #22aa66;
}

body {
  min-height: 100vh;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: "Segoe UI", sans-serif;
  overflow: hidden;
  color: var(--txt);
}

/* ===== ノイズ背景 ===== */
body::before {
  content: "";
  position: fixed; inset: 0;
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 30%, #1a1050 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 70%, #0a1535 0%, transparent 60%);
  pointer-events: none;
}

/* ===== カード ===== */
.card {
  background: var(--card);
  border: 1px solid var(--card-b);
  border-radius: 14px;
  padding: 28px 34px 20px;
  width: 430px;
  box-shadow: 0 0 60px rgba(40,40,120,0.4), 0 0 0 1px #ffffff08;
  position: relative;
  z-index: 1;
}

/* ===== タイトル（ゆらゆら） ===== */
@keyframes titleWobble {
  0%,100% { transform: translateX(0) rotate(0deg); }
  20%      { transform: translateX(-3px) rotate(-0.5deg); }
  40%      { transform: translateX(4px) rotate(0.8deg); }
  60%      { transform: translateX(-2px) rotate(-0.3deg); }
  80%      { transform: translateX(3px) rotate(0.5deg); }
}
h1 {
  text-align: center;
  color: #8899ff;
  font-size: 22px;
  margin-bottom: 2px;
  animation: titleWobble 3.5s ease-in-out infinite;
  display: inline-block;
  width: 100%;
}

/* ===== マーキー警告 ===== */
.marquee-wrap {
  overflow: hidden;
  white-space: nowrap;
  margin-bottom: 14px;
  background: #1a0010;
  border-radius: 4px;
  padding: 3px 0;
}
@keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
.marquee-inner {
  display: inline-block;
  animation: marquee 10s linear infinite;
  font-size: 11px;
  color: var(--danger);
  font-weight: bold;
}

/* ===== ラベル（ふわふわ） ===== */
@keyframes labelFloat {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-2px); }
}
label {
  display: block;
  font-size: 12px;
  margin-top: 12px;
  margin-bottom: 4px;
  color: var(--txt-dim);
  animation: labelFloat 2s ease-in-out infinite;
}
label:nth-of-type(2) { animation-delay: 0.3s; }
label:nth-of-type(3) { animation-delay: 0.7s; }
label:nth-of-type(4) { animation-delay: 1.1s; }
label:nth-of-type(5) { animation-delay: 0.5s; }

/* ===== インプット ===== */
.input-row { display: flex; gap: 6px; }

input[type="text"],
input[type="password"] {
  width: 100%;
  padding: 8px 10px;
  background: var(--in-bg);
  border: 1.5px solid var(--in-b);
  border-radius: 7px;
  font-size: 14px;
  color: var(--txt);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px #4455ee22;
}
input:disabled { opacity: 0.4; cursor: not-allowed; }
input::placeholder { color: var(--txt-dim); }

.eye-btn {
  padding: 0 10px;
  border: 1.5px solid var(--in-b);
  border-radius: 7px;
  background: var(--in-bg);
  color: var(--txt);
  cursor: pointer;
  font-size: 16px;
  flex-shrink: 0;
  transition: border-color 0.2s;
}
.eye-btn:hover { border-color: var(--accent); }

/* ===== 強度バー ===== */
.strength-wrap { margin-top: 6px; }
.strength-bar {
  height: 6px;
  background: #1a1a2a;
  border-radius: 3px;
  overflow: hidden;
}
.strength-fill {
  height: 100%;
  width: 4%;
  background: var(--danger);
  transition: width 0.2s;
}
.strength-label { font-size: 10px; color: var(--danger); margin-top: 2px; }

/* ===== 要件ボックス ===== */
.requirements {
  background: #1a0a10;
  border: 1px solid #440020;
  border-radius: 7px;
  padding: 8px 12px;
  margin-top: 10px;
  font-size: 11px;
}
.requirements p { font-weight: bold; margin-bottom: 4px; color: var(--danger); }
.requirements ul { padding-left: 16px; }

@keyframes reqWiggle {
  0%,100% { transform: translateX(0); }
  25%     { transform: translateX(2px); }
  75%     { transform: translateX(-2px); }
}
.requirements li {
  margin-bottom: 3px;
  color: #cc5577;
  animation: reqWiggle 1.8s ease-in-out infinite;
}
.requirements li:nth-child(2) { animation-delay: 0.3s; }
.requirements li:nth-child(3) { animation-delay: 0.6s; }
.requirements li:nth-child(4) { animation-delay: 0.9s; }

/* ===== キャプチャ ===== */
.captcha-box {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  background: #0a0a20;
  border: 1.5px solid var(--in-b);
  border-radius: 7px;
  padding: 6px 10px;
}
@keyframes captchaDistort {
  0%,100% { letter-spacing: 4px; transform: skewX(0deg); }
  30%     { letter-spacing: 5px; transform: skewX(-2deg); }
  70%     { letter-spacing: 3px; transform: skewX(1.5deg); }
}
.captcha-text {
  font-family: "Courier New", monospace;
  font-size: 19px;
  font-weight: bold;
  color: #6688ff;
  text-decoration: line-through wavy #334;
  filter: blur(0.5px);
  user-select: none;
  flex: 1;
  animation: captchaDistort 2.5s ease-in-out infinite;
}
.refresh-btn {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.refresh-btn:hover { opacity: 1; }

/* ===== ステータス ===== */
.status-msg {
  font-size: 11px;
  color: var(--danger);
  min-height: 16px;
  text-align: center;
  margin-top: 6px;
}

/* ===== ログインボタン（逃げる） ===== */
#loginBtn {
  position: fixed;
  padding: 11px 30px;
  background: linear-gradient(135deg, #3344cc, #5566ff);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  z-index: 9999;
  box-shadow: 0 4px 20px #3344cc66;
  /* スムーズに逃げる → 追えば捕まえられる */
  transition: left 0.18s cubic-bezier(0.22, 1, 0.36, 1),
              top  0.18s cubic-bezier(0.22, 1, 0.36, 1),
              background 0.2s;
}
#loginBtn:hover { background: linear-gradient(135deg, #2233bb, #4455ee); }
@keyframes btnPulse {
  0%,100% { box-shadow: 0 4px 20px #3344cc66; }
  50%     { box-shadow: 0 4px 30px #5566ffaa; }
}
#loginBtn { animation: btnPulse 2s ease-in-out infinite; }

/* ===== 浮遊テキスト（背景） ===== */
.floater {
  position: fixed;
  font-size: 11px;
  color: #ffffff08;
  pointer-events: none;
  white-space: nowrap;
  z-index: 0;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  from { transform: translateY(100vh) rotate(-5deg); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  to   { transform: translateY(-120px) rotate(5deg); opacity: 0; }
}

/* ===== カウンター ===== */
#tryCounter {
  position: fixed;
  top: 12px;
  right: 16px;
  font-size: 11px;
  color: var(--txt-dim);
  z-index: 100;
  text-align: right;
  line-height: 1.6;
}

/* ===== モーダル ===== */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 10000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #0e0e1c;
  border: 1px solid #cc335544;
  border-radius: 12px;
  padding: 28px 32px;
  min-width: 300px;
  max-width: 380px;
  text-align: center;
  box-shadow: 0 0 40px #cc335533;
  animation: modalShake 0.3s ease;
}
@keyframes modalShake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-8px); }
  40%     { transform: translateX(8px); }
  60%     { transform: translateX(-5px); }
  80%     { transform: translateX(5px); }
}
.modal h2 { color: var(--danger); margin-bottom: 12px; font-size: 17px; }
.modal p  { color: var(--txt); font-size: 13px; margin-bottom: 16px; line-height: 1.7; }
.modal button {
  padding: 8px 22px;
  background: #cc3355;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.2s;
}
.modal button:hover { background: #aa2244; }

/* ===== 成功モーダル ===== */
#successModal .modal { border-color: #22aa6644; box-shadow: 0 0 40px #22aa6633; }
#successModal .modal h2 { color: var(--green); }
.progress-wrap {
  background: #0a1a10;
  border-radius: 4px;
  height: 12px;
  overflow: hidden;
  margin: 10px 0 14px;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #22aa66, #44ffaa);
  transition: width 0.03s linear;
}

/* ===== スクランブルアニメ用 ===== */
.scramble { display: inline-block; }
</style>
</head>
<body>

<!-- 浮遊テキスト（背景演出） -->
<div id="floaters"></div>

<!-- 試行カウンター -->
<div id="tryCounter">
  試行回数: <span id="cntNum">0</span><br>
  <span id="cntComment" style="color:#cc3355;font-size:10px;">がんばれ（無駄）</span>
</div>

<div class="card" id="card">
  <h1 id="mainTitle">ログイン</h1>

  <!-- マーキー -->
  <div class="marquee-wrap">
    <span class="marquee-inner" id="marqueeText">
      ⚠ このサイトは安全です ⚠ &nbsp;&nbsp;&nbsp; セキュリティレベル: 銀河最高 &nbsp;&nbsp;&nbsp;
      あなたのパスワードは既に漏洩しています &nbsp;&nbsp;&nbsp; ご安心ください（嘘） &nbsp;&nbsp;&nbsp;
      今すぐログイン！（できません） &nbsp;&nbsp;&nbsp;
    </span>
  </div>

  <label id="lbl1">ユーザー名:</label>
  <input type="text" value="admin" disabled>

  <label id="lbl2">パスワード:</label>
  <div class="input-row">
    <input type="password" id="pwInput" placeholder="パスワードを入力してください（意味なし）" autocomplete="off">
    <button class="eye-btn" id="eyeBtn">👁</button>
  </div>

  <div class="strength-wrap">
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    <div class="strength-label" id="strengthLabel">論外</div>
  </div>

  <div class="requirements">
    <p>⚠ パスワード要件（毎回変わります）:</p>
    <ul id="reqList"></ul>
  </div>

  <label id="lbl3">キャプチャ認証 (<span id="captchaNum">1</span>/<span id="captchaTotal">∞</span>):</label>
  <div class="captcha-box">
    <span class="captcha-text" id="captchaText"></span>
    <button class="refresh-btn" id="refreshCaptcha">🔄</button>
  </div>
  <label id="lbl4">上の文字を <em>正確に</em> 入力:</label>
  <input type="text" id="captchaInput" placeholder="ここに入力（どうせリセットされます）" autocomplete="off">

  <div class="status-msg" id="statusMsg"></div>
</div>

<!-- ログインボタン（逃げる） -->
<button id="loginBtn">ログイン</button>

<!-- エラーモーダル -->
<div class="modal-overlay" id="errorModal">
  <div class="modal">
    <h2 id="errorTitle">エラー</h2>
    <p id="errorMsg"></p>
    <button onclick="closeError()">OK（諦めないで）</button>
  </div>
</div>

<!-- 成功モーダル -->
<div class="modal-overlay" id="successModal">
  <div class="modal">
    <h2>ログイン成功！</h2>
    <p>アクセスを確認中...<br><small style="color:#557755">しばらくお待ちください</small></p>
    <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>
    <p id="successSub" style="font-size:11px;color:#446644;"></p>
  </div>
</div>

<script>
// ===== データ =====
const ANNOYING_MESSAGES = [
  "パスワードが違います！（合ってても違います）",
  "もう一度やり直してください（永遠に）",
  "ヒント：正解はありません",
  "大文字？小文字？全部？知らんw",
  "セキュリティのため、正解でも弾きます",
  "エラー: パスワードが正しすぎます",
  "パスワードの有効期限が切れました（入力前に）",
  "半角・全角・斜め角を確認してください",
  "このブラウザは非対応です（何を使っても同じ）",
  "パスワードに宇宙のエネルギーが足りません",
  "認証サーバーが拒否しました（気分で）",
  "キャプチャが間違っています（合ってても）",
  "アカウントが一時ロックされました（永久に）",
  "パスワードに愛が足りません 💔",
];

const REQUIREMENTS = [
  ["大文字を含む", "小文字を含む", "数字を含む", "記号を含む", "絵文字を含む 🔥"],
  ["8文字以上", "100文字以下", "文字数が素数であること"],
  ["あなたの誕生日を含む", "でも個人情報は使わないで"],
  ["過去10000回のパスワードと異なること"],
  ["スペースを含む", "でもスペースは使用禁止"],
  ["回文であること（前から読んでも後ろから読んでも同じ）"],
  ["月曜日の午前3時のみ有効"],
  ["「password」を含めないでください", "でも「password」は必須です"],
  ["あなたの血液型を含む", "でも医療情報は使用禁止"],
  ["母音で始まる", "でも母音は使用禁止"],
  ["隣接するキーを2回以上使わない", "でも全てのキーを使う"],
  ["パスワードをローマ字で読むと意味のある日本語になること"],
];

const TITLES = [
  "セキュアログインシステム v∞",
  "ログイン... しないでください",
  "認証中... (∞%)",
  "エラー 404: やる気が見つかりません",
  "セキュリティレベル: 銀河最高",
  "ログイン試行: 無駄です",
  "あなたのデータは安全です（嘘）",
  "パスワードを思い出して...",
  "接続中... (0.0001%)",
];

const CNT_COMMENTS = [
  "がんばれ（無駄）", "もう少し（嘘）", "あきらめないで（でも無理）",
  "惜しい！（全然惜しくない）", "記録更新中...", "そろそろ疲れた？",
  "人類の限界に挑戦中", "なぜ続けるの？", "哲学的な問いですね",
];

const STRENGTH_LABELS = ["論外", "最弱", "弱すぎ", "弱い", "まだ弱い", "論外（再）"];
const CAPTCHA_CHARS = "0OIl1ABCDEFGHJKLMNPQRSTUVWXabcdefghijkmnpqrstuvwxyz23456789";

// ===== 状態 =====
let attemptCount  = 0;
let captchaAnswer = "";
let captchaCount  = 1;
let btnEscaping   = false;

// ===== 要素 =====
const pwInput       = document.getElementById("pwInput");
const strengthFill  = document.getElementById("strengthFill");
const strengthLabel = document.getElementById("strengthLabel");
const reqList       = document.getElementById("reqList");
const captchaText   = document.getElementById("captchaText");
const captchaInput  = document.getElementById("captchaInput");
const loginBtn      = document.getElementById("loginBtn");
const statusMsg     = document.getElementById("statusMsg");
const errorModal    = document.getElementById("errorModal");
const successModal  = document.getElementById("successModal");
const cntNum        = document.getElementById("cntNum");
const cntComment    = document.getElementById("cntComment");
const captchaNum    = document.getElementById("captchaNum");

// ===== キャプチャ =====
function newCaptchaStr() {
  let s = "";
  for (let i = 0; i < 8; i++)
    s += CAPTCHA_CHARS[Math.floor(Math.random() * CAPTCHA_CHARS.length)];
  return s;
}
function refreshCaptcha() {
  captchaAnswer = newCaptchaStr();
  captchaText.textContent = captchaAnswer;
  captchaInput.value = "";
  captchaNum.textContent = captchaCount++;
}
document.getElementById("refreshCaptcha").addEventListener("click", refreshCaptcha);
refreshCaptcha();

// ===== パスワード強度 =====
pwInput.addEventListener("input", () => {
  const len = pwInput.value.length;
  if (len > 0 && Math.random() < 0.08) {
    pwInput.value = pwInput.value.slice(0, -1);
    showStatus("セキュリティのため1文字削除されました");
  }
  const w = Math.min(len * 3, 28);
  strengthFill.style.width = w + "%";
  const idx = Math.min(Math.floor(len / 3), STRENGTH_LABELS.length - 1);
  strengthLabel.textContent = STRENGTH_LABELS[idx];
});

// ===== 目ボタン =====
document.getElementById("eyeBtn").addEventListener("click", () => {
  pwInput.type = "text";
  setTimeout(() => { pwInput.type = "password"; }, 280);
});

// ===== 要件更新 =====
function updateRequirements() {
  const set = REQUIREMENTS[Math.floor(Math.random() * REQUIREMENTS.length)];
  reqList.innerHTML = set.map(r => `<li>${r}</li>`).join("");
}
updateRequirements();

// ===== ボタンが逃げる（transition付きで追えば捕まる） =====
function runAway() {
  if (btnEscaping) return;
  btnEscaping = true;
  const bw = loginBtn.offsetWidth;
  const bh = loginBtn.offsetHeight;
  // 逃げる距離: 試行回数が増えるほど遠くへ
  const range = Math.min(0.4 + attemptCount * 0.06, 0.95);
  const maxX = window.innerWidth  - bw - 10;
  const maxY = window.innerHeight - bh - 10;
  const cx = parseFloat(loginBtn.style.left) + bw / 2;
  const cy = parseFloat(loginBtn.style.top)  + bh / 2;
  // マウスから離れる方向へ
  let nx, ny;
  // ランダム方向に飛ぶ
  nx = Math.random() * maxX * range + (1 - range) * maxX / 2;
  ny = Math.random() * maxY * range + (1 - range) * maxY / 2;
  nx = Math.max(10, Math.min(maxX, nx));
  ny = Math.max(10, Math.min(maxY, ny));
  loginBtn.style.left = nx + "px";
  loginBtn.style.top  = ny + "px";
  setTimeout(() => { btnEscaping = false; }, 220);
}

loginBtn.addEventListener("mouseenter", runAway);

// 初期位置（カード下中央）
loginBtn.style.left = (window.innerWidth  / 2 - 55) + "px";
loginBtn.style.top  = (window.innerHeight - 80) + "px";

// ===== ログイン試行 =====
loginBtn.addEventListener("click", tryLogin);

function tryLogin() {
  attemptCount++;
  cntNum.textContent = attemptCount;
  cntComment.textContent = CNT_COMMENTS[Math.min(attemptCount - 1, CNT_COMMENTS.length - 1)];
  shakeCard();
  refreshCaptcha();
  updateRequirements();

  const msg = ANNOYING_MESSAGES[Math.floor(Math.random() * ANNOYING_MESSAGES.length)];
  setTimeout(() => showError(`エラー #${attemptCount}`, msg), 350);

  if (attemptCount >= 10 && attemptCount % 10 === 0) {
    setTimeout(fakeSuccess, 1000);
  }
}

// ===== エラーモーダル =====
function showError(title, msg) {
  document.getElementById("errorTitle").textContent = title;
  document.getElementById("errorMsg").textContent = msg;
  errorModal.classList.add("show");
}
function closeError() { errorModal.classList.remove("show"); }

// ===== ニセ成功 =====
function fakeSuccess() {
  successModal.classList.add("show");
  const fill = document.getElementById("progressFill");
  const sub  = document.getElementById("successSub");
  let w = 0;
  const steps = ["認証中...", "サーバー接続中...", "権限を確認中...", "ほぼ完了...", "実は最初からやり直し"];
  const timer = setInterval(() => {
    w += 1;
    fill.style.width = w + "%";
    if (w % 20 === 0) sub.textContent = steps[Math.floor(w / 20)];
    if (w >= 100) {
      clearInterval(timer);
      setTimeout(() => {
        successModal.classList.remove("show");
        fill.style.width = "0%";
        sub.textContent = "";
        pwInput.value = "";
        refreshCaptcha();
        updateRequirements();
        showStatus("リセットされました。最初からどうぞ 😊");
      }, 800);
    }
  }, 22);
}

// ===== カードを揺らす =====
function shakeCard() {
  const card = document.getElementById("card");
  let n = 14;
  const iv = setInterval(() => {
    const dx = (Math.random() - 0.5) * 22;
    const dy = (Math.random() - 0.5) * 18;
    card.style.transform = `translate(${dx}px,${dy}px) rotate(${(Math.random()-0.5)*1.5}deg)`;
    if (--n <= 0) {
      clearInterval(iv);
      card.style.transform = "";
    }
  }, 30);
}

// ===== ステータスメッセージ =====
let statusTimer = null;
function showStatus(msg) {
  statusMsg.textContent = msg;
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => { statusMsg.textContent = ""; }, 2200);
}

// ===== 定期うざい演出 =====

// タイトル回転
setInterval(() => {
  document.title = TITLES[Math.floor(Math.random() * TITLES.length)];
}, 2000);

// パスワード自動クリア
setInterval(() => {
  if (Math.random() < 0.2 && pwInput.value.length > 3) {
    pwInput.value = "";
    showStatus("セキュリティタイムアウト: 再入力してください");
  }
}, 5000);

// ボタンが勝手に移動
setInterval(() => {
  if (Math.random() < 0.25) runAway();
}, 2800);

// マーキーのテキストをたまに書き換え
const MARQUEE_MSGS = [
  "⚠ このサイトは安全です ⚠ &nbsp;&nbsp;&nbsp; セキュリティレベル: 銀河最高 &nbsp;&nbsp;&nbsp; あなたのパスワードは既に漏洩しています &nbsp;&nbsp;&nbsp; ご安心ください（嘘） &nbsp;&nbsp;&nbsp;",
  "🔒 認証中... &nbsp;&nbsp;&nbsp; エラー #∞ &nbsp;&nbsp;&nbsp; パスワードを正しく入力してください（無理） &nbsp;&nbsp;&nbsp; サポート: 対応しておりません &nbsp;&nbsp;&nbsp;",
  "🚨 不審なアクセスを検知しました（あなたのことです） &nbsp;&nbsp;&nbsp; 直ちにパスワードを変更してください（できません） &nbsp;&nbsp;&nbsp;",
];
setInterval(() => {
  document.getElementById("marqueeText").innerHTML =
    MARQUEE_MSGS[Math.floor(Math.random() * MARQUEE_MSGS.length)];
}, 7000);

// ===== 浮遊テキスト（背景） =====
const FLOAT_WORDS = [
  "ERROR", "404", "ACCESS DENIED", "INVALID", "RETRY", "TIMEOUT",
  "FORBIDDEN", "LOCKED", "REJECTED", "FAILED", "??????", "NULL",
  "パスワードが違います", "再試行", "エラー", "拒否", "無効",
];
function spawnFloater() {
  const div = document.createElement("div");
  div.className = "floater";
  div.textContent = FLOAT_WORDS[Math.floor(Math.random() * FLOAT_WORDS.length)];
  div.style.left = Math.random() * 100 + "vw";
  const dur = 8 + Math.random() * 8;
  div.style.animationDuration = dur + "s";
  div.style.animationDelay = "0s";
  div.style.fontSize = (9 + Math.random() * 10) + "px";
  div.style.color = `rgba(${Math.floor(Math.random()*60+40)},${Math.floor(Math.random()*40+20)},${Math.floor(Math.random()*80+60)},0.12)`;
  document.getElementById("floaters").appendChild(div);
  setTimeout(() => div.remove(), dur * 1000 + 500);
}
setInterval(spawnFloater, 800);
spawnFloater(); spawnFloater(); spawnFloater();

// ===== プレースホルダーが変わる =====
const PW_PLACEHOLDERS = [
  "パスワードを入力してください（意味なし）",
  "ここに入力（どうせ失敗します）",
  "強いパスワード？無意味です",
  "あなたのパスワードは既に知っています",
  "••••••••（でも見ています）",
];
setInterval(() => {
  pwInput.placeholder = PW_PLACEHOLDERS[Math.floor(Math.random() * PW_PLACEHOLDERS.length)];
}, 3500);

// ===== ラベルのテキストがたまにスクランブル =====
const LABELS = [
  { el: document.getElementById("lbl2"), orig: "パスワード:" },
  { el: document.getElementById("lbl4"), orig: "上の文字を 正確に 入力:" },
];
const SCRAMBLE_CHARS = "アイウエオカキクケコ#@!?%&*ABCDEFGabcdefg01234";
function scrambleLabel(el, orig, ms = 600) {
  let elapsed = 0;
  const iv = setInterval(() => {
    elapsed += 40;
    if (elapsed >= ms) {
      el.innerText = orig;
      clearInterval(iv);
    } else {
      el.innerText = orig.split("").map(c =>
        c === " " ? " " : (Math.random() < 0.4
          ? SCRAMBLE_CHARS[Math.floor(Math.random() * SCRAMBLE_CHARS.length)]
          : c)
      ).join("");
    }
  }, 40);
}
setInterval(() => {
  const lbl = LABELS[Math.floor(Math.random() * LABELS.length)];
  scrambleLabel(lbl.el, lbl.orig);
}, 3000);
</script>
